[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@anthropic-ai/sdk"]

# Scheduled Functions (UTC time)
# Discovery: M-F at 11:00 UTC = 6:00 AM ET (during EST), 7:00 AM ET (during EDT)
[[scheduled.functions]]
  function = "discovery"
  cron = "0 11 * * 1-5"

# Analysis: M-F at 11:15 UTC, 15min after discovery
[[scheduled.functions]]
  function = "analyze"
  cron = "15 11 * * 1-5"

# Mark-to-market: every 2h during US market hours (14-21 UTC = 9 AM-4 PM ET)
[[scheduled.functions]]
  function = "update-prices"
  cron = "0 14,16,18,20 * * 1-5"

# Fast movers: cada 5 min en horario de mercado. Gate interno afina 9:30-16:00 ET.
[[scheduled.functions]]
  function = "scan-movers"
  cron = "*/5 13-21 * * 1-5"

# End of day: close trades that hit stops/targets, snapshot equity
[[scheduled.functions]]
  function = "end-of-day"
  cron = "30 21 * * 1-5"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-:splat"
  status = 200
